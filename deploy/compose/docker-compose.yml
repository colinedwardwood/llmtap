# Local LGTM-mini stack for demoing llmtap. Brings up:
#   - llmtap          :4000   the proxy
#   - otel-collector  :4317   OTLP gRPC + :4318 OTLP HTTP (fan-out)
#   - tempo           :3200   distributed tracing
#   - prometheus      :9090   metrics
#   - loki            :3100   logs
#   - grafana         :3000   UI, datasources & dashboard pre-provisioned
#
# Quick start (from repo root):
#   make compose-up
#   export OPENAI_BASE_URL=http://localhost:4000/v1
#   <run any OpenAI-compatible client>
#   open http://localhost:3000  (admin / admin)
#
services:
  llmtap:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: llmtap:dev
    ports:
      - "4000:4000"
    environment:
      LLMTAP_LISTEN: "0.0.0.0:4000"
      # Demo stack only: this exposes plaintext :4000 on the docker bridge so
      # the host can reach it. In any real deployment configure tls.cert_file
      # and tls.key_file (see deploy/compose/README for an mTLS example).
      LLMTAP_ALLOW_INSECURE: "true"
      LLMTAP_OTLP_ENDPOINT: "otel-collector:4317"
      LLMTAP_OTLP_PROTOCOL: "grpc"
      LLMTAP_OTLP_INSECURE: "true"
      LLMTAP_CAPTURE: "off"
      LLMTAP_ENV: "demo"
    depends_on:
      otel-collector:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

  tempo:
    image: grafana/tempo:2.6.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"

  prometheus:
    image: prom/prometheus:v2.55.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --enable-feature=otlp-write-receiver
      - --web.enable-remote-write-receiver
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:3.2.0
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor"
    ports:
      - "3000:3000"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - tempo
      - prometheus
      - loki
