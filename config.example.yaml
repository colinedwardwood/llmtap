# llmtap config — see https://github.com/colinedwardwood/llmtap
#
# All scalar values are overridable from environment variables prefixed with
# LLMTAP_. The structural sections (upstreams) belong here.

# Address llmtap listens on. Clients point their *_BASE_URL at this address.
# Default is loopback-only on purpose: a non-loopback bind requires either
# TLS (below) or an explicit allow_insecure=true to acknowledge plaintext.
listen: "127.0.0.1:4000"

# Acknowledge serving plaintext on a non-loopback interface. Only set this
# in trusted environments (sidecar, single-host docker bridge) where the
# network between client and proxy is not reachable from outside.
allow_insecure: false

# Listener-side TLS termination. Setting cert_file + key_file flips llmtap
# to HTTPS; clients then use OPENAI_BASE_URL=https://llmtap.internal/v1.
# Setting client_ca_file additionally requires every client to present a
# certificate chained to that CA (mTLS). This is the right knob when llmtap
# is shared across services in a VPC.
tls:
  cert_file: ""        # e.g. /etc/llmtap/tls.crt
  key_file:  ""        # e.g. /etc/llmtap/tls.key
  client_ca_file: ""   # optional, enables required mTLS

# Upstream LLM APIs. The first matching prefix (longest wins) routes the
# request. Provider must be one of: openai | anthropic.
upstreams:
  - name: openai
    prefix: /v1
    target: https://api.openai.com
    provider: openai
    # max_in_flight: 256          # cap concurrent forwarded requests;
                                  # over-cap = 429 + Retry-After: 1.
                                  # Pairs with the circuit breaker
                                  # below so an upstream brownout
                                  # can't melt the proxy. 0 (default)
                                  # = unlimited.
    # pin_sha256:                 # Optional upstream certificate
    #   - 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcd  # SPKI sha256, hex (32B/64 chars).
    #                             # Each entry must match the leaf
    #                             # SPKI sha256 of an upstream cert
    #                             # currently in rotation. Stdlib
    #                             # chain verification still runs;
    #                             # this is the additional pin layer.
    # breaker:                    # Per-upstream circuit breaker.
    #   failures: 5               # trip after N consecutive 5xx.
    #                             # 0 (default) disables the breaker.
    #   window: 30s               # consecutive count resets if no
    #                             # failure within window. 0 = no
    #                             # time bound on the run.
    #   recovery_window: 15s      # breaker stays open this long
    #                             # before admitting one probe.

  - name: anthropic
    prefix: /anthropic
    target: https://api.anthropic.com
    provider: anthropic
    # max_in_flight: 256
    # pin_sha256: []
    # breaker:
    #   failures: 5
    #   recovery_window: 15s

# OpenTelemetry export. Endpoint format depends on protocol:
#   grpc: "host:4317"        (no scheme)
#   http: "host:4318"        (no scheme; HTTPS implied unless insecure: true)
telemetry:
  endpoint: localhost:4317
  protocol: grpc
  insecure: true
  # acknowledge_insecure: true   # required when insecure=true AND endpoint
                                 # is not loopback / RFC1918. Exporting
                                 # prompts in cleartext over the WAN is
                                 # rarely intentional, so the proxy
                                 # refuses by default.
  sample_ratio: 1.0
  timeout: 10s
  # headers:
  #   X-Scope-OrgID: tenant-1

# Prompt/completion content capture. mode controls whether content is
# emitted at all; redact scrubs every captured string before it reaches
# a span attribute.
#
#   mode: off|events|logs
#     off    - only metadata (model, tokens, finish reasons) leaves
#              the proxy. Default.
#     events - attach content as span events.
#     logs   - send content via the OTel log signal (retention can be
#              scoped separately at the collector).
#
#   redact: off|default|strict
#     off     - passthrough, no scrubbing. Must be explicit opt-in.
#     default - mask high-confidence credential / PII markers:
#               OpenAI sk-, Slack xox*, AWS AKIA, GCP service-account
#               private_key, common JWT shape, emails. RECOMMENDED.
#     strict  - default + credit-card (Luhn-validated) + US SSN +
#               E.164 phone numbers. For regulated workloads.
#
# Default value is "default" so flipping mode to events without
# thinking about redaction doesn't silently ship secrets.
content:
  mode: off
  redact: default

http:
  read_header_timeout: 30s
  idle_timeout: 120s
  shutdown_timeout: 30s
  # body_read_timeout bounds the inbound request read (headers + body).
  # A slow uploader trying to pin a goroutine for the full body
  # duration trips it. Zero disables the deadline (do not do this in
  # production). Outbound response writes stay unbounded so streaming
  # LLM responses can legitimately run for minutes.
  body_read_timeout: 30s
  # cert_reload_interval is how often llmtap re-stats tls.cert_file and
  # tls.key_file and atomically swaps the served cert when ModTime
  # advances. This is what makes cert-manager / Let's Encrypt renewals
  # work without restarting the process. Zero disables hot-reload.
  cert_reload_interval: 30s

# Inbound request shaping. llmtap buffers up to 1 MiB of every request
# body for parser-driven enrichment, then forwards the original stream
# byte-for-byte. Bodies above max_body_bytes are refused with HTTP 413
# without contacting the upstream. Default is 32 MiB to accommodate
# multimodal (vision / audio) payloads.
request:
  max_body_bytes: 33554432   # 32 MiB

# Listener-side bearer-token authentication. When `tokens` is empty
# (the default), every reachable caller may use the proxy — which is
# fine on a loopback bind but dangerous anywhere else, since the
# proxy forwards `Authorization: Bearer sk-…` to the upstream LLM
# verbatim. Generate one hash per client with `llmtap hash-token`:
#
#   echo -n 'client-secret-here' | ./llmtap hash-token
#
# The plaintext token goes in the client's env (e.g. as a custom
# header injected by their SDK); the hash goes here.
auth:
  # tokens:
  #   - "$argon2id$v=19$m=65536,t=3,p=2$<salt>$<hash>"
  header: "X-LLMTAP-Token"   # default; keeps Authorization free for the upstream

# Cost catalogue override. Built-in prices ship with llmtap (see
# internal/pricing/prices.yaml for the embedded snapshot). Production
# deployments should point `path` at a YAML file with the same shape
# to record negotiated rates instead of public list price. The file
# is merged on top of the built-ins, so unspecified models keep their
# default rate.
#
# `fail_open: false` is recommended for production — a missing or
# malformed file fails the proxy at startup so operators notice.
# `fail_open: true` swallows the error and falls back to the
# built-in catalogue.
pricing:
  path: ""           # e.g. /etc/llmtap/prices.yaml
  fail_open: false

service:
  name: llmtap
  namespace: observability
  environment: dev
